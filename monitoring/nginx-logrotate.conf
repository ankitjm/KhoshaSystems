# Nginx log rotation for Khosha Systems
# Place at /etc/logrotate.d/khosha-nginx on the server
/root/Production/logs/apps/khosha-systems-access.log
/root/Production/logs/apps/khosha-systems-error.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 root adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}
